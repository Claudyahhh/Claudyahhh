<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Building in public</title>
  <desc id="desc">A visual build loop and current AI exploration topics.</desc>

  <rect width="1200" height="720" fill="#FFC9C9"/>
  <rect x="0" y="0" width="1200" height="154" fill="#FFF1C7"/>
  <rect x="48" y="48" width="1104" height="624" rx="8" fill="none" stroke="#4A6FA5" stroke-width="2"/>

  <text x="88" y="102" fill="#4A6FA5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">02 / BUILDING IN PUBLIC</text>
  <text x="88" y="199" fill="#4A6FA5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="750">I build to make questions tangible.</text>
  <text x="88" y="239" fill="#4A6FA5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">The decisions, constraints and failed assumptions are part of the work — so I share them too.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect x="88" y="292" width="232" height="128" rx="6" fill="#FFF1C7" stroke="#4A6FA5" stroke-width="2"/>
    <text x="112" y="329" fill="#4A6FA5" font-size="14" font-weight="700">01 / QUESTION</text>
    <text x="112" y="365" fill="#4A6FA5" font-size="16">Challenge the</text>
    <text x="112" y="391" fill="#4A6FA5" font-size="16">default.</text>

    <path d="M320 356 H364" stroke="#4A6FA5" stroke-width="2"/>
    <path d="M356 348 L366 356 L356 364" fill="none" stroke="#4A6FA5" stroke-width="2"/>

    <rect x="366" y="292" width="232" height="128" rx="6" fill="#FFF1C7" fill-opacity="0.72" stroke="#4A6FA5" stroke-width="2"/>
    <text x="390" y="329" fill="#4A6FA5" font-size="14" font-weight="700">02 / BUILD</text>
    <text x="390" y="365" fill="#4A6FA5" font-size="16">Make the idea</text>
    <text x="390" y="391" fill="#4A6FA5" font-size="16">tangible.</text>

    <path d="M598 356 H642" stroke="#4A6FA5" stroke-width="2"/>
    <path d="M634 348 L644 356 L634 364" fill="none" stroke="#4A6FA5" stroke-width="2"/>

    <rect x="644" y="292" width="232" height="128" rx="6" fill="#FFF1C7" stroke="#4A6FA5" stroke-width="2"/>
    <text x="668" y="329" fill="#4A6FA5" font-size="14" font-weight="700">03 / SHIP</text>
    <text x="668" y="365" fill="#4A6FA5" font-size="16">Release before</text>
    <text x="668" y="391" fill="#4A6FA5" font-size="16">it feels finished.</text>

    <path d="M876 356 H920" stroke="#4A6FA5" stroke-width="2"/>
    <path d="M912 348 L922 356 L912 364" fill="none" stroke="#4A6FA5" stroke-width="2"/>

    <rect x="922" y="292" width="190" height="128" rx="6" fill="#4A6FA5" stroke="#4A6FA5" stroke-width="2"/>
    <text x="946" y="329" fill="#FFF1C7" font-size="14" font-weight="700">04 / LEARN</text>
    <text x="946" y="365" fill="#FFF1C7" font-size="16">Let reality</text>
    <text x="946" y="391" fill="#FFF1C7" font-size="16">change the system.</text>
  </g>

  <rect x="88" y="470" width="1024" height="134" rx="6" fill="#FFF1C7" fill-opacity="0.68" stroke="#4A6FA5" stroke-width="2"/>
  <text x="116" y="509" fill="#4A6FA5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">CURRENTLY EXPLORING</text>
  <text x="116" y="550" fill="#4A6FA5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">Agent Harnesses · proactive agents · long-running context · trust outside the demo</text>
  <text x="116" y="579" fill="#4A6FA5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">and how non-CS builders can create real technical leverage without pretending the layer does not matter.</text>

  <text x="600" y="646" text-anchor="middle" fill="#4A6FA5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">↓ SELECTED WORK IS PINNED BELOW</text>
</svg>
